name: Deploy to GitHub Pages
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: seaguard-next/package-lock.json
      - name: Install dependencies
        working-directory: seaguard-next
        run: npm ci
      - name: Build
        working-directory: seaguard-next
        run: npm run build
      - name: Add .nojekyll
        run: touch seaguard-next/out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: seaguard-next/out
      - id: deployment
        uses: actions/deploy-pages@v4
